        &globalPluginTolerations
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodePluginTolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
